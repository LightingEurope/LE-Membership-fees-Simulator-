<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Membership Fee Simulator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 400px;
      margin: 40px auto;
      padding: 20px;
      border: 1px solid #444;
      border-radius: 8px;
      background: #2c2c2c;
      text-align: center;
      color: #fff;
    }
    label, input, select {
      display: block;
      width: 100%;
      margin-bottom: 10px;
      text-align: left;
    }
    input, select {
      padding: 8px;
      border: none;
      border-radius: 4px;
      background: #444;
      color: #fff;
    }
    button {
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      background-color: #4caf50;
      color: white;
      cursor: pointer;
      margin: 10px auto;
      display: block;
    }
    #result {
      font-weight: bold;
      color: #8f8;
      margin-top: 15px;
    }
    img {
      max-width: 120px;
      height: auto;
      display: block;
      margin: 0 auto 20px;
    }
    h2 {
      font-size: 24px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <img src="https://i.postimg.cc/2S5qgLdZ/Untitled-Presentation.jpg" alt="Logo LightingEurope">
  <h2>Membership Fee Simulator</h2>
  <label for="type">Type:</label>
  <select id="type">
    <option value="Company">Company</option>
    <option value="Association">Association</option>
  </select>

  <label for="amount">Turnover Amount (in millions):</label>
  <input type="number" id="amount" placeholder="e.g. 3.5 for 3 500 000">
  <button onclick="calculerFrais()">Calculate</button>
  <div id="result"></div>

  <script>
    function calculerFrais() {
      const a = parseFloat(document.getElementById("amount").value);
      const type = document.getElementById("type").value;
      let frais = 0;

      if (isNaN(a)) {
        document.getElementById("result").textContent = "Please enter a valid amount.";
        return;
      }

      if (type === "Company") {
        if (a <= 1) frais = 5000;
        else if (a <= 5) frais = 5000 + 380 * (a - 1);
        else if (a <= 25) frais = 6520 + 330 * (a - 5);
        else if (a <= 50) frais = 13120 + 200 * (a - 25);
        else if (a <= 200) frais = 18120 + 140 * (a - 50);
        else if (a <= 900) frais = 39120 + 135 * (a - 200);
        else if (a <= 2000) frais = 133620 + 113 * (a - 900);
        else frais = 257920 + 100 * (a - 2000);
      } else if (type === "Association") {
        if (a <= 100) frais = 4000;
        else if (a <= 250) frais = 4000 + 35 * (a - 100);
        else if (a <= 500) frais = 9250 + 30 * (a - 250);
        else if (a <= 800) frais = 16750 + 25 * (a - 500);
        else if (a <= 1000) frais = 24250 + 20 * (a - 800);
        else if (a <= 2000) frais = 28250 + 15 * (a - 1000);
        else frais = 43250 + 10 * (a - 2000);
      }

      document.getElementById("result").textContent = `Estimated fees: €${frais.toFixed(2)}`;
    }
  </script>
</body>
</html>
